version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: kolo_db
    environment:
      POSTGRES_USER: kolo_user
      POSTGRES_PASSWORD: kolo_password_dev
      POSTGRES_DB: kolo_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./packages/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./packages/db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kolo_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: kolo_api
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://kolo_user:kolo_password_dev@postgres:5432/kolo_db
      JWT_SECRET: dev-secret-change-in-production
      USE_MOCK: "false"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
      - /app/node_modules
    command: npm run dev

volumes:
  postgres_data:
